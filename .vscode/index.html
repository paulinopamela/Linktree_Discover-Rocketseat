<!doctype html>
<html lang="en" class="light">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevLinks</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container">
      <div id="profile">
        <img
          src="/assets/assets/photo-avatar-dark.png"
          alt="Foto de um mar metalizado reluzindo"
        />
        <p>@pamelapaulino</p>

      <div id="switch" onclick="toggleMode()">
        <button></button>
        <span></span>
      </div>

        <ul>
          <li><a href="https://github.com/paulinopamela">Site</a></li>
          <li><a href="">LinkedIn</a></li>
          <li><a href="https://github.com/paulinopamela">GitHub</a></li>
        </ul>
        <div id="social-links">
          <a href="#" target="_blank">
            <ion-icon name="laptop-outline"></ion-icon
          ></a>

          <a href="https://linkedin.com/in/" target="_blank">
            <ion-icon name="logo-linkedin"></ion-icon
          ></a>

          <a href="https://github.com/paulinopamela" target="_blank">
            <ion-icon name="logo-github"></ion-icon
          ></a>
        </div>


      <footer>
        Feito em conjunto com a
        <a href="https://rocketseat.com.br"
          >Rockeseat <ion-icon name="rocket-outline"></ion-icon
        ></a>
      </footer>
    </div>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script src="./script.js"></script>
